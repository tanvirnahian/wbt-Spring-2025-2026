<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>      
             <h1>Contact Me</h1>
    <!-- Simple Registration Form -->
    <form method="post">

        <fieldset>
            <legend>Registration Form</legend>
            <label for="first name">First Name:</label>
            <input type="text" id="name" placeholder="Enter your name" name="name" required><br><br>
             <label for="last name">Last Name:</label>
            <input type="text" id="name" placeholder="Enter your name" name="name" required><br><br>
              <label for="Company">company:</label>
            <input type="text" id="company" placeholder="Enter your company" name="company" required><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female<br><br>
                 <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
               <br>
              <tr>
                    <td><label>Reason of contacts:</label></td>
                    <td>
                        <input type="checkbox" value="Project"> Project
                        <input type="checkbox" value="Thesis"> Thesis
                        <input type="checkbox" value="Job">Job
                       
                    </td>
                </tr>
                <br>
                 <tr>
                    <td><label>Topics:</label></td>
                    <td>
                        <input type="checkbox" value="Web Development"> Web development
                        <input type="checkbox" value="Mobile Development">Mobile Development
                        <input type="checkbox" value="AI/ML Development">AI/ML Development
                       
                    </td>
                </tr>
        
                <br>
            <label for="Consultion Date">Consultion Date:</label>
            <input type="date" id="consultion" placeholder="Enter date" date="date" required><br><br>
            </fieldset>
            <br>
              <button>Submit</button>
               <br>
                 <button>Reset</button>
                <br>
                <a href="index.html">Back to home</a> 
</body>

</html>
